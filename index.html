<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Spotify Style Player</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    height: 100vh;
    overflow: hidden;
  }

  /* Background blur */
  .bg {
    position: fixed;
    width: 100%;
    height: 100%;
    background-size: cover;
    background-position: center;
    filter: blur(25px) brightness(0.4);
    transform: scale(1.2);
    z-index: -1;
  }

  .player {
    width: 300px;
    margin: auto;
    text-align: center;
    color: white;
    position: relative;
    top: 50%;
    transform: translateY(-50%);
  }

  .cover {
    width: 100%;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  }

  h2 {
    margin: 15px 0 5px;
  }

  p {
    color: #ccc;
  }

  input[type="range"] {
    width: 100%;
    margin-top: 10px;
  }

  .controls {
    margin-top: 15px;
  }

  button {
    background: white;
    border: none;
    border-radius: 50%;
    width: 60px;
    height: 60px;
    font-size: 20px;
    cursor: pointer;
  }

  .upload {
    margin-top: 20px;
    font-size: 12px;
  }
</style>
</head>

<body>

<div class="bg" id="bg"></div>
<div class="player">
  <img id="cover" class="cover" src="cover.jpg">



  <h2 id="title">Surat Cinta untuk starla x Bahagia Lagi</h2>
  <p id="artist">FL Kyy Everyday</p>

  <input type="range" id="progress" value="0">

  <div class="controls">
    <button onclick="togglePlay()">▶</button>
  </div>

  <audio id="audio" src="music.mp3"></audio>

  <div class="upload">
    <input type="file" id="musicUpload" accept="audio/*"><br><br>
    <input type="file" id="imageUpload" accept="image/*">
  </div>
</div>

<script>
const audio = document.getElementById("audio");
const progress = document.getElementById("progress");
const cover = document.getElementById("cover");
const bg = document.getElementById("bg");

// Set background awal
bg.style.backgroundImage = `url(${cover.src})`;

function togglePlay() {
  if (audio.paused) {
    audio.play();
  } else {
    audio.pause();
  }
}

// Update progress
audio.addEventListener("timeupdate", () => {
  progress.value = (audio.currentTime / audio.duration) * 100 || 0;
});

// Seek
progress.addEventListener("input", () => {
  audio.currentTime = (progress.value / 100) * audio.duration;
});

// Upload musik
document.getElementById("musicUpload").addEventListener("change", function(e) {
  const file = e.target.files[0];
  if (file) {
    audio.src = URL.createObjectURL(file);
  }
});

// Upload gambar + update background
document.getElementById("imageUpload").addEventListener("change", function(e) {
  const file = e.target.files[0];
  if (file) {
    const url = URL.createObjectURL(file);
    cover.src = url;
    bg.style.backgroundImage = `url(${url})`;
  }
});
</script>

</body>
</html>
