<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Music Player</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(#1e1e1e, #000);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .player {
      width: 300px;
      text-align: center;
    }

    .cover {
      width: 100%;
      border-radius: 10px;
    }

    h2 {
      margin: 10px 0 0;
    }

    p {
      color: #aaa;
      margin: 5px 0 15px;
    }

    .controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      margin-top: 10px;
    }

    button {
      background: none;
      border: none;
      color: white;
      font-size: 20px;
      cursor: pointer;
    }

    input[type="range"] {
      width: 100%;
      margin-top: 10px;
    }

    .upload {
      margin-top: 15px;
      font-size: 12px;
    }
  </style>
</head>
<body>

<div class="player">
  <img id="cover" class="cover" src="cover.jpg">

  <h2 id="title">Judul Lagu</h2>
  <p id="artist">Nama Artist</p>

  <input type="range" id="progress" value="0">

  <div class="controls">
    <button onclick="togglePlay()">▶️</button>
  </div>

  <audio id="audio" src="music.mp3"></audio>

  <div class="upload">
    <input type="file" id="musicUpload" accept="audio/*"><br><br>
    <input type="file" id="imageUpload" accept="image/*">
  </div>
</div>

<script>
const audio = document.getElementById("audio");
const progress = document.getElementById("progress");
const cover = document.getElementById("cover");

function togglePlay() {
  if (audio.paused) {
    audio.play();
  } else {
    audio.pause();
  }
}

// Update progress bar
audio.addEventListener("timeupdate", () => {
  progress.value = (audio.currentTime / audio.duration) * 100;
});

// Seek lagu
progress.addEventListener("input", () => {
  audio.currentTime = (progress.value / 100) * audio.duration;
});

// Upload musik
document.getElementById("musicUpload").addEventListener("change", function(e) {
  const file = e.target.files[0];
  if (file) {
    audio.src = URL.createObjectURL(file);
  }
});

// Upload gambar
document.getElementById("imageUpload").addEventListener("change", function(e) {
  const file = e.target.files[0];
  if (file) {
    cover.src = URL.createObjectURL(file);
  }
});
</script>

</body>
</html>
